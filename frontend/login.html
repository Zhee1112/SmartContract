<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bridge Security Dashboard</title>
  <link rel="stylesheet" href="css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="12" fill="#1a56db"/>
            <path d="M12 24h6v-6h6v-6h6v6h6v6h-6v6h-6v6h-6v-6h-6z" fill="white" opacity="0.9"/>
            <circle cx="24" cy="24" r="4" fill="#1a56db"/>
          </svg>
        </div>
        <h1>Bridge Security Dashboard</h1>
        <p>Gas Optimization and Security of Smart Contract Bridge Based on EIP-1153 Transient Storage in 4-Tier Architecture</p>
      </div>

      <div class="tab-container">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <form id="loginForm" class="form active">
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" name="username" required autocomplete="username" placeholder="Masukkan username">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" required autocomplete="current-password" placeholder="Masukkan password">
        </div>
        <div class="error-message" id="loginError"></div>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <form id="registerForm" class="form">
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" name="username" required autocomplete="username" placeholder="3-30 karakter, huruf/angka/underscore">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" name="password" required autocomplete="new-password" placeholder="Minimal 6 karakter, ada huruf besar+kecil+angka">
        </div>
        <div class="form-group">
          <label for="regPasswordConfirm">Konfirmasi Password</label>
          <input type="password" id="regPasswordConfirm" name="passwordConfirm" required autocomplete="new-password" placeholder="Ulangi password">
        </div>
        <div class="error-message" id="registerError"></div>
        <div class="success-message" id="registerSuccess"></div>
        <button type="submit" class="btn-primary">Register</button>
      </form>

      <div class="login-footer">
        <p>Skripsi: Gas Optimization and Security of Smart Contract Bridge Based on EIP-1153 Transient Storage in 4-Tier Architecture</p>
        <a href="/" style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:.82rem;color:var(--text-muted);text-decoration:none;transition:color .15s"><span class="material-symbols-outlined" style="font-size:16px">arrow_back</span> Kembali ke Dashboard</a>
      </div>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
