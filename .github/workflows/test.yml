name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  foundry:
    name: Foundry Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv

      - name: Run Gas Snapshot
        run: forge snapshot

      - name: Upload gas snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot

  python:
    name: Python Simulation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install numpy matplotlib

      - name: Run Monte Carlo Simulation
        run: python scripts/dynamic_submission_engine.py

      - name: Run Dashboard Generator
        run: python scripts/generate_dashboard.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: logs/
