[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
gas_reports = ["*"]

[profile.sepolia]
rpc_endpoints = { sepolia = "${SEPOLIA_RPC_URL}" }
etherscan = { sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" } }

[profile.mainnet]
rpc_endpoints = { mainnet = "${MAINNET_RPC_URL}" }
etherscan = { mainnet = { key = "${ETHERSCAN_API_KEY}", url = "https://api.etherscan.io/api" } }
